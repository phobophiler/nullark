<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" text-rendering="geometricPrecision" shape-rendering="geometricPrecision">

<defs>
  <radialGradient id="bg" cx="50%" cy="42%" r="78%">
    <stop offset="0%" stop-color="#17201D"/>
    <stop offset="48%" stop-color="#0B1110"/>
    <stop offset="100%" stop-color="#050807"/>
  </radialGradient>

  <radialGradient id="accentGlow" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#22E6A8" stop-opacity="0.30"/>
    <stop offset="42%" stop-color="#0F9B7A" stop-opacity="0.11"/>
    <stop offset="100%" stop-color="#050807" stop-opacity="0"/>
  </radialGradient>

  <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="48%" stop-color="#F3F4F8"/>
    <stop offset="100%" stop-color="#98A6A2"/>
  </linearGradient>

  <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#D9FFF1"/>
    <stop offset="100%" stop-color="#00B386"/>
  </linearGradient>

  <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncA type="table" tableValues="0 0.045"/>
    </feComponentTransfer>
  </filter>

  <filter id="markShadow" x="-35%" y="-35%" width="170%" height="170%">
    <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.52"/>
    <feDropShadow dx="0" dy="0" stdDeviation="1.4" flood-color="#FFFFFF" flood-opacity="0.14"/>
  </filter>

  <filter id="typeShadow" x="-15%" y="-45%" width="130%" height="190%">
    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.38"/>
    <feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#FFFFFF" flood-opacity="0.08"/>
  </filter>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geologica:wght@400;500;600&amp;display=swap');

    .geo { font-family: 'Geologica', Arial, Helvetica, sans-serif; font-weight: 500; fill: url(#metal); filter: url(#typeShadow); }
    .micro { font-family: Arial, Helvetica, sans-serif; fill: #7DEBC6; letter-spacing: 10px; font-size: 18px; }
    .small-label { font-family: Arial, Helvetica, sans-serif; fill: #7DEBC6; letter-spacing: 9px; font-size: 20px; }
    .headline { font-family: 'Geologica', Arial, Helvetica, sans-serif; font-weight: 500; fill: url(#metal); letter-spacing: 18px; filter: url(#typeShadow); }
    .accent-headline { font-family: 'Geologica', Arial, Helvetica, sans-serif; font-weight: 500; fill: url(#accent); letter-spacing: 18px; filter: url(#typeShadow); }
    .thin { stroke: url(#accent); stroke-width: 2; opacity: 0.88; }
    .thin-soft { stroke: #7DEBC6; stroke-width: 1.4; opacity: 0.28; }
    .rule { stroke: #FFFFFF; stroke-width: 1; opacity: 0.14; }
  </style>

  <g id="nullark-mark" fill="url(#metal)" filter="url(#markShadow)">
    <path d="M0 0L0 137L15 137L16 38L116 136L116 112Z"/>
    <path d="M167 0L101 70L171 137L195 137L123 69L190 0Z"/>
  </g>
</defs>


  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" filter="url(#grain)" opacity="0.55"/>
  <circle cx="512.0" cy="512.0" r="248" fill="url(#accentGlow)" opacity="0.78"/>
  <g transform="translate(336.5 388.7) scale(1.8)">
    <use href="#nullark-mark"/>
  </g>

</svg>
