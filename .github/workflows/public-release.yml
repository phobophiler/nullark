name: public-release

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      production_readiness:
        description: Run explicit production/mainnet readiness gate
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  public-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: foundry-rs/foundry-toolchain@v1
      - run: npm ci
      - run: npm ci --prefix circuits
      - run: forge install foundry-rs/forge-std --no-git
        working-directory: contracts
      - run: npm run public:verify

  production-readiness:
    if: github.event_name == 'workflow_dispatch' && inputs.production_readiness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: foundry-rs/foundry-toolchain@v1
      - run: npm ci
      - run: npm ci --prefix circuits
      - run: forge install foundry-rs/forge-std --no-git
        working-directory: contracts
      - run: pipx install slither-analyzer
      - run: npm run production:readiness:verify
