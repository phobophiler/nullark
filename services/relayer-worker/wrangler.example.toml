name = "nullark-relayer"
main = "src/index.ts"
compatibility_date = "2026-05-06"
workers_dev = false
preview_urls = false

[observability]
enabled = true

[vars]
# Example placeholder only. This file is not an approved deployment binding.
RELAYER_CONFIG_BINDING_STATUS = "example-placeholder-not-approved"
RELAYER_ENVIRONMENT = "megaeth-mainnet"
MAINNET_RELAYER_APPROVED = "false"
MEGAETH_MAINNET_RPC_URL = "https://mainnet.megaeth.com/rpc"
SHIELDED_POOL_ADDRESS = "replace-with-nullark-mainnet-pool-address"
WITHDRAWAL_RELAYER_ADDRESS = "replace-with-approved-withdrawal-relayer-address"
MAINNET_RELAYER_PUBLIC_RUNTIME_SHA256 = "replace-with-public-artifacts-current-json-sha256"
MAINNET_RELAYER_TRUSTED_SETUP_SHA256 = "replace-with-trusted-setup-record-json-sha256"
RELAYER_V1_2_WITHDRAW_SELECTOR = "replace-with-approved-withdraw-selector"
RELAYER_V1_2_FEE_SOURCE = "on-chain-feeBps"

[[kv_namespaces]]
binding = "RELAYER_IDEMPOTENCY_KV"
id = "replace-with-cloudflare-kv-namespace-id"

[[kv_namespaces]]
binding = "RELAYER_RATE_LIMIT_KV"
id = "replace-with-cloudflare-kv-namespace-id"

[[durable_objects.bindings]]
name = "RELAYER_NONCE_QUEUE"
class_name = "RelayerNonceQueue"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelayerNonceQueue"]
